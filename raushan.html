<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>PDF Store Admin</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
  body{
    font-family: system-ui, Arial;
    background:#f5f7fb;
    padding:20px;
  }
  .box{
    max-width:900px;
    margin:auto;
    background:#fff;
    padding:20px;
    border-radius:10px;
    box-shadow:0 10px 30px rgba(0,0,0,.08);
  }
  h2{margin-top:0}
  label{display:block;margin-top:12px;font-weight:600}
  input, textarea, button{
    width:100%;
    padding:10px;
    margin-top:6px;
    font-size:14px;
  }
  textarea{min-height:120px;font-family:monospace}
  button{
    background:#2563eb;
    color:#fff;
    border:none;
    cursor:pointer;
    border-radius:6px;
    margin-top:15px;
  }
  button:hover{opacity:.9}
  .row{display:flex;gap:10px}
  .row > div{flex:1}
  .note{
    background:#f1f5f9;
    padding:10px;
    border-radius:6px;
    font-size:13px;
    margin-top:10px;
  }
</style>
</head>

<body>

<div class="box">
  <h2>📘 PDF Store Admin Panel</h2>

  <label>Admin Token</label>
  <input id="adminToken" placeholder="ADMIN_TOKEN">

  <label>PDF ID</label>
  <input id="pdfId" placeholder="pdf1">

  <label>PDF Title</label>
  <input id="pdfName" placeholder="SSC Maths Notes">

  <label>Price (in paise)</label>
  <input id="pdfPrice" placeholder="9900">

  <label>Download Files (JSON)</label>
  <textarea id="pdfDownloads">
[
  {
    "name": "SSC Maths Part-1",
    "url": "https://pdf.autopush.in/ssc-maths-1.pdf"
  },
  {
    "name": "SSC Maths Part-2",
    "url": "https://pdf.autopush.in/ssc-maths-2.pdf"
  }
]
  </textarea>

  <button onclick="savePDF()">💾 Save / Update PDF</button>

  <div class="note">
    ✔ Same form works for <b>Add</b> and <b>Update</b><br>
    ✔ Existing ID → Update<br>
    ✔ New ID → Insert
  </div>
</div>

<script>
async function savePDF(){
  const token = document.getElementById("adminToken").value.trim();
  const id = document.getElementById("pdfId").value.trim();
  const name = document.getElementById("pdfName").value.trim();
  const price = document.getElementById("pdfPrice").value.trim();
  const downloadsRaw = document.getElementById("pdfDownloads").value.trim();

  if(!token || !id || !name || !price || !downloadsRaw){
    alert("All fields required");
    return;
  }

  let downloads;
  try{
    downloads = JSON.parse(downloadsRaw);
  }catch(e){
    alert("Invalid JSON in downloads");
    return;
  }

  const res = await fetch("https://api.raushan-d9d.workers.dev/admin-save?token="+encodeURIComponent(token),{
    method:"POST",
    headers:{ "Content-Type":"application/json" },
    body: JSON.stringify({
      id,
      name,
      price: Number(price),
      downloads
    })
  });

  const out = await res.json();
  alert(JSON.stringify(out));
}
</script>

</body>
</html>
